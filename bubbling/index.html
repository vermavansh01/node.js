<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .container {
        border: 2px solid black;
        margin: 10px;
        padding: 12px;
        background-color: aqua;
      }
      .child {
        border: 2px solid black;
        margin: 10px;
        padding: 12px;
        background-color: antiquewhite;
      }
      .grandchild {
        border: 2px solid black;
        margin: 10px;
        padding: 12px;
        background-color:aliceblue;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="child">
        <div class="grandchild">hey i am grandchild</div>
      </div>
    </div>
    <script>
        document.querySelector(".container").addEventListener("dblclick", (e)=>{
            e.stopPropagation()
          alert("hey i am conatiner")
      })
        document.querySelector(".child").addEventListener("dblclick", (e)=>{
            e.stopPropagation()
          alert("hey i am child")
      })
        document.querySelector(".grandchild").addEventListener("dblclick", (e)=>{
            e.stopPropagation()
          alert("hey i am grandchild")
      })
    </script>
  </body>
</html>
